[package]
name = "engram-rs"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "engram"
path = "src/main.rs"

[dependencies]
directories = "6.0"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive", "env"] }
ignore = "0.4"
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
walkdir = "2"

# Embedding model
candle-core = { version = "0.8", default-features = false }
candle-nn = { version = "0.8", default-features = false }
candle-transformers = { version = "0.8", default-features = false }
tokenizers = { version = "0.20", default-features = false, features = ["onig"] }
owo-colors = { version = "4.3.0", features = ["supports-colors"] }

# PDF text extraction
pdf-extract = "0.10"

# Image decoding
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "gif", "bmp", "tiff", "webp"] }

# OCR
ocrs = "0.12"
rten = "0.24"

[build-dependencies]
ureq = { version = "2", features = ["tls"] }
serde_json = "1"
